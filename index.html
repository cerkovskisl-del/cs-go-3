<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Web 3D Offline Prototips v3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #0c0f12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            border-bottom: 4px solid #de9b35;
            display: flex;
            gap: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 5;
            transition: opacity 0.3s;
            opacity: 0;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            display: none;
        }
        .ch-line {
            position: absolute;
            background: #00ff00;
            box-shadow: 0 0 4px #00ff00;
            transition: transform 0.1s ease;
        }
        #ch-top    { top: 0; left: 14px; width: 2px; height: 8px; }
        #ch-bottom { bottom: 0; left: 14px; width: 2px; height: 8px; }
        #ch-left   { top: 14px; left: 0; width: 8px; height: 2px; }
        #ch-right  { top: 14px; right: 0; width: 8px; height: 2px; }

        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        .menu-card {
            background: rgba(15, 23, 42, 0.8);
            padding: 40px 60px;
            border-radius: 12px;
            border: 2px solid #334155;
            border-bottom: 6px solid #de9b35;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .btn {
            background-color: #de9b35;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(222, 155, 53, 0.3);
        }
        .btn:hover { background-color: #c98a2d; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        .controls-info {
            margin-top: 25px;
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.6;
        }
        .controls-info strong { color: #e2e8f0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="menu-card">
            <h1 id="menu-title" style="color: #de9b35; font-size: 46px; margin: 0 0 10px 0; letter-spacing: 2px;">COUNTER-STRIKE 2</h1>
            <p id="menu-sub" style="color: #9ca3af; font-size: 18px; margin: 0 0 20px 0;">3D Web Offline Simulator</p>
            <button class="btn" onclick="startMatch()">START MATCH</button>
            
            <div class="controls-info">
                <strong>W, A, S, D</strong> — Kustība (A/D salabots)<br>
                <strong>Pele</strong> — Skatīties apkārt & Tēmēt<br>
                <strong>Kreisais klikšķis</strong> — Šaut | <strong>R</strong> — Pārlādēt ieroci
            </div>
        </div>
    </div>

    <div id="crosshair">
        <div class="ch-line" id="ch-top"></div>
        <div class="ch-line" id="ch-bottom"></div>
        <div class="ch-line" id="ch-left"></div>
        <div class="ch-line" id="ch-right"></div>
    </div>

    <div id="hud">
        <div style="color: #3b82f6;">KILLS: <span id="score">0</span></div>
        <div style="color: #ef4444;">HP: <span id="hp">100</span>%</div>
        <div style="color: #f59e0b;">AMMO: <span id="ammo">30/90</span></div>
    </div>

<script>
    const menuContainer = document.getElementById('menu-container');
    const menuTitle = document.getElementById('menu-title');
    const menuSub = document.getElementById('menu-sub');
    const hud = document.getElementById('hud');
    const crosshair = document.getElementById('crosshair');
    
    let isLocked = false;
    let gameStarted = false;

    function startMatch() {
        if (player.hp <= 0) {
            // Restartē spēli, ja miris
            window.location.reload();
            return;
        }
        document.body.requestPointerLock();
    }

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            menuContainer.style.display = 'none';
            hud.style.opacity = '1';
            crosshair.style.display = 'block';
            isLocked = true;
            gameStarted = true;
        } else {
            if (player.hp > 0) {
                menuTitle.innerText = "SPĒLE PAUZĒTA";
                menuSub.innerText = "Noklikšķini uz pogas, lai turpinātu maču";
                menuContainer.style.display = 'flex';
                hud.style.opacity = '0.5';
            }
            isLocked = false;
        }
    });

    // --- 3D Vide ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x232d3a);
    scene.fog = new THREE.FogExp2(0x232d3a, 0.022);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Apgaismojums
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sunLight = new THREE.DirectionalLight(0xfff7ed, 0.85);
    sunLight.position.set(25, 45, 15);
    scene.add(sunLight);

    // Grīda
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ color: 0x5c5245, roughness: 0.9 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- Uzlabota Karte ---
    const walls = [];
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x807361, roughness: 0.8, metalness: 0.1 });
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x925414, roughness: 0.85 });

    function addStructure(x, z, w, h, d, material = wallMat) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
        mesh.position.set(x, h / 2, z);
        scene.add(mesh);
        walls.push(mesh);
    }

    // Ārējais perimetrs
    addStructure(0, -60, 120, 8, 2); addStructure(0, 60, 120, 8, 2);
    addStructure(-60, 0, 2, 8, 120); addStructure(60, 0, 2, 8, 120);

    // Dust II stila izkārtojums (Sienas, tuneļi, kastes)
    addStructure(-25, -25, 20, 6, 4);
    addStructure(25, -20, 4, 6, 25);
    addStructure(0, -10, 30, 6, 4);
    addStructure(-15, 25, 4, 6, 20);
    addStructure(15, 35, 20, 6, 4);
    
    // Taktiskās kastes
    addStructure(6, 6, 3, 3, 3, boxMat);
    addStructure(9, 6, 2.4, 2.4, 2.4, boxMat);
    addStructure(7, 9, 2.2, 2.2, 2.2, boxMat);
    addStructure(-30, 5, 4, 4, 4, boxMat);
    addStructure(-26, 5, 3, 3, 3, boxMat);
    addStructure(35, 25, 3.5, 3.5, 3.5, boxMat);

    // --- Spēlētāja iestatījumi ---
    const player = {
        hp: 100, score: 0, ammo: 30, maxAmmo: 30, reserveAmmo: 90,
        speed: 13.5, isReloading: false
    };
    camera.position.set(0, 2, 50);

    // 3D Ierocis
    const gunGroup = new THREE.Group();
    const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.07, 0.35), new THREE.MeshStandardMaterial({ color: 0x1f2937 }));
    const barrelMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.25), new THREE.MeshStandardMaterial({ color: 0x111827 }));
    barrelMesh.rotation.x = Math.PI / 2;
    barrelMesh.position.z = -0.25;
    gunGroup.add(bodyMesh, barrelMesh);
    scene.add(gunGroup);

    const flashLight = new THREE.PointLight(0xfde047, 0, 4);
    flashLight.position.set(0, 0, -0.4);
    gunGroup.add(flashLight);

    // Kustību vadība
    const keys = { w: false, a: false, s: false, d: false };
    let velocity = new THREE.Vector3(), yaw = 0, pitch = 0;
    let mouseX = 0, mouseY = 0;

    document.addEventListener('keydown', (e) => { 
        if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
        if(e.key.toLowerCase() === 'r') reload();
    });
    document.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    
    document.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        mouseX = e.movementX;
        mouseY = e.movementY;
        yaw -= e.movementX * 0.0022;
        pitch -= e.movementY * 0.0022;
        pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    });

    // --- Boti & Efekti ---
    const bots = [];
    const particles = [];
    const raycaster = new THREE.Raycaster();

    function spawnBot(x, z) {
        const bot = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.8, 1.6), new THREE.MeshStandardMaterial({ color: 0x9a3412 }));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xd97706 }));
        head.position.y = 1.7;
        bot.add(body, head);
        bot.position.set(x, 1.4, z);
        bot.lastShot = 0;
        scene.add(bot);
        bots.push(bot);
    }

    // Botu izvietošana arēnā
    spawnBot(-40, -40); spawnBot(40, -40); spawnBot(-40, 20); spawnBot(40, 35);

    // Šaušanas mehānika
    document.addEventListener('mousedown', (e) => {
        if (!isLocked || e.button !== 0 || player.hp <= 0 || player.ammo <= 0 || player.isReloading) return;

        player.ammo--;
        updateHUD();

        // Atsitiena (Recoil) vizuālā animācija
        gunGroup.position.z += 0.08;
        gunGroup.position.y += 0.02;

        flashLight.intensity = 3.5;
        setTimeout(() => flashLight.intensity = 0, 45);

        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        
        const intersectsBot = raycaster.intersectObjects(bots, true);
        const intersectsWall = raycaster.intersectObjects(walls);

        let bDist = intersectsBot.length > 0 ? intersectsBot[0].distance : Infinity;
        let wDist = intersectsWall.length > 0 ? intersectsWall[0].distance : Infinity;

        if (intersectsBot.length > 0 && bDist < wDist) {
            let hitBot = intersectsBot[0].object;
            while (hitBot.parent && hitBot.parent !== scene) hitBot = hitBot.parent;
            
            createBlood(intersectsBot[0].point);

            // Bota pārvietošana (respawn) pēc nāves
            hitBot.position.set((Math.random() - 0.5) * 80, 1.4, (Math.random() - 0.5) * 80);
            player.score++;
            updateHUD();
        }
    });

    function reload() {
        if (player.isReloading || player.ammo === player.maxAmmo || player.reserveAmmo <= 0) return;
        player.isReloading = true;
        document.getElementById('ammo').innerText = "RELOADING";
        setTimeout(() => {
            const needed = player.maxAmmo - player.ammo;
            const transfer = Math.min(needed, player.reserveAmmo);
            player.ammo += transfer;
            player.reserveAmmo -= transfer;
            player.isReloading = false;
            updateHUD();
        }, 1400);
    }

    function updateHUD() {
        document.getElementById('score').innerText = player.score;
        document.getElementById('hp').innerText = Math.max(0, Math.ceil(player.hp));
        if(!player.isReloading) document.getElementById('ammo').innerText = `${player.ammo}/${player.reserveAmmo}`;
    }

    function createBlood(pos) {
        for (let i = 0; i < 12; i++) {
            const pMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshBasicMaterial({ color: 0xb91c1c }));
            pMesh.position.copy(pos);
            scene.add(pMesh);
            particles.push({
                mesh: pMesh,
                v: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3+1, (Math.random()-0.5)*4),
                life: 0.9
            });
        }
    }

    // --- Galvenais Cikls ---
    const clock = new THREE.Clock();
    let bobTime = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const time = performance.now();

        if (player.hp <= 0) {
            isLocked = false;
            crosshair.style.display = 'none';
            menuTitle.innerText = "DEFEAT / K.I.A.";
            menuTitle.style.color = "#ef4444";
            menuSub.innerHTML = `Tu zaudēji cīņu.<br>Tavs rezultāts: <strong>${player.score}</strong> nošauti boti.`;
            document.getElementById('instructions').innerText = "Noklikšķini uz pogas, lai sāktu jaunu spēli";
            menuContainer.style.display = 'flex';
            hud.style.opacity = '0';
            return;
        }

        if (isLocked) {
            // 1. Kustības fizika (A un D kontroles salabotas)
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            let moveZ = Number(keys.w) - Number(keys.s);
            let moveX = Number(keys.d) - Number(keys.a); // Izmainīts virziens pareizai A/D kustībai

            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0; camDir.normalize();
            
            // Pareizs sānu vektors (Right Vector) kameras kustībai
            const camRight = new THREE.Vector3().crossVectors(camDir, camera.up).normalize();

            if (keys.w || keys.s) velocity.addScaledVector(camDir, moveZ * player.speed * 10 * delta);
            if (keys.a || keys.d) velocity.addScaledVector(camRight, moveX * player.speed * 10 * delta);

            const oldPos = camera.position.clone();
            camera.position.addScaledVector(velocity, delta);

            // Dinamiskais tēmekļa izplešanās efekts skrienot
            const currentSpeed = velocity.length();
            const spreadOffset = Math.min(15, currentSpeed * 0.8);
            document.getElementById('ch-top').style.transform = `translateY(-${spreadOffset}px)`;
            document.getElementById('ch-bottom').style.transform = `translateY(${spreadOffset}px)`;
            document.getElementById('ch-left').style.transform = `translateX(-${spreadOffset}px)`;
            document.getElementById('ch-right').style.transform = `translateX(${spreadOffset}px)`;

            // Sienu kolīzijas pārbaude
            walls.forEach(wall => {
                if (new THREE.Box3().setFromObject(wall).intersectsBox(new THREE.Box3(
                    new THREE.Vector3(camera.position.x-0.7, 0, camera.position.z-0.7),
                    new THREE.Vector3(camera.position.x+0.7, 4, camera.position.z+0.7)
                ))) { camera.position.copy(oldPos); }
            });
            camera.position.y = 2;

            // 2. Ieroča pozīcija (Bobbing & Sway)
            gunGroup.position.copy(camera.position);
            gunGroup.quaternion.copy(camera.quaternion);

            let tX = 0.16, tY = -0.22, tZ = -0.45;
            if (player.isReloading) { tY = -0.45; tX = 0.12; }

            if (keys.w || keys.s || keys.a || keys.d) {
                bobTime += delta * 12;
                tY += Math.sin(bobTime) * 0.014;
                tX += Math.cos(bobTime / 2) * 0.008;
            }

            tX -= mouseX * 0.0003;
            tY += mouseY * 0.0003;
            mouseX *= 0.85; mouseY *= 0.85;

            gunGroup.translateX(tX); gunGroup.translateY(tY); gunGroup.translateZ(tZ);
            gunGroup.position.y = THREE.MathUtils.lerp(gunGroup.position.y, gunGroup.position.y, 0.1);

            // 3. Botu AI un Šaušana
            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position).normalize();
                raycaster.set(bot.position, dir);
                const intersects = raycaster.intersectObjects(walls);
                const dToP = bot.position.distanceTo(camera.position);

                if ((intersects.length === 0 || intersects[0].distance > dToP) && dToP < 50) {
                    if (time - bot.lastShot > 1500) { // Šauj ik pēc 1.5s
                        bot.lastShot = time;
                        player.hp -= 10;
                        updateHUD();
                        
                        // Sarkana trasējošā šāviena līnija
                        const lineGeo = new THREE.BufferGeometry().setFromPoints([bot.position.clone().add(new THREE.Vector3(0,1.4,0)), camera.position.clone().sub(new THREE.Vector3(0,0.3,0))]);
                        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xef4444 }));
                        scene.add(line);
                        setTimeout(() => scene.remove(line), 45);
                    }
                }

                // Kustība uz spēlētāju
                const botOld = bot.position.clone();
                bot.position.addScaledVector(dir, 3.2 * delta);
                bot.position.y = 1.4;
                walls.forEach(w => {
                    if(new THREE.Box3().setFromObject(w).intersectsBox(new THREE.Box3().setFromObject(bot))) bot.position.copy(botOld);
                });
            });

            // 4. Daļiņas
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.v.y -= 9.8 * delta;
                p.mesh.position.addScaledVector(p.v, delta);
                p.life -= delta * 1.2;
                if(p.mesh.position.y < 0.05) p.mesh.position.y = 0.05;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
