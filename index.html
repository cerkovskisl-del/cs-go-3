<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Web 3D Offline Prototips v2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #0c0f12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(15, 23, 42, 0.85);
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            border-bottom: 4px solid #de9b35;
            display: flex;
            gap: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #00ff00;
            box-shadow: 0 0 4px #00ff00;
        }
        #crosshair::before { top: 5px; left: -12px; width: 36px; height: 2px; }
        #crosshair::after { top: -12px; left: 5px; width: 2px; height: 36px; }
        
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 15, 20, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }
        .btn {
            background-color: #de9b35;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover { background-color: #c98a2d; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <h1 id="title" style="color: #de9b35; font-size: 42px; margin-bottom: 5px;">CS2 3D WEB SIMULATORS</h1>
        <p style="color: #9ca3af; margin-top: 0;">Uzlabotā versija ar taktisko karti un efektiem</p>
        <p id="instructions" style="font-size: 18px;">Noklikšķini uz pogas, lai sāktu raundu</p>
        <button class="btn">START MATCH</button>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <div style="color: #3b82f6;">KILLS: <span id="score">0</span></div>
        <div style="color: #ef4444;">HP: <span id="hp">100</span>%</div>
        <div style="color: #f59e0b;">AMMO: <span id="ammo">30/90</span></div>
    </div>

<script>
    const blocker = document.getElementById('blocker');
    let isLocked = false;

    document.body.addEventListener('click', (e) => {
        if (player.hp > 0) document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            blocker.style.display = 'none';
            isLocked = true;
        } else {
            if (player.hp > 0) blocker.style.display = 'flex';
            isLocked = false;
        }
    });

    // --- 3D Vide ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e293b); // CS2 stila apgaismojuma debesis
    scene.fog = new THREE.FogExp2(0x1e293b, 0.025);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Gaisma
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const sunLight = new THREE.DirectionalLight(0xfff7ed, 0.9);
    sunLight.position.set(30, 50, 20);
    scene.add(sunLight);

    // Grīda (Dust II tekstūras imitācija)
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x6b5a47, roughness: 0.9 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- Uzlabota Karte (Sienas & Kastes) ---
    const walls = [];
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x8c7a65, roughness: 0.7 }); // Betona dzeltenīga nokrāsa
    const boxMat = new THREE.MeshStandardMaterial({ color: 0xa16207, roughness: 0.8 });  // Koka kastes

    function addStructure(x, z, w, h, d, material = wallMat) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
        mesh.position.set(x, h / 2, z);
        scene.add(mesh);
        walls.push(mesh);
    }

    // Ārējās robežas
    addStructure(0, -50, 100, 8, 2); addStructure(0, 50, 100, 8, 2);
    addStructure(-50, 0, 2, 8, 100); addStructure(50, 0, 2, 8, 100);

    // Taktiskie aizsegi un labirinta elementi
    addStructure(-20, -20, 15, 5, 4);
    addStructure(20, -20, 4, 5, 20);
    addStructure(0, -5, 25, 5, 3);
    addStructure(-15, 20, 4, 5, 16);
    
    // CS2 stila "Kastes" (A un B punkti)
    addStructure(5, 5, 3, 3, 3, boxMat);
    addStructure(8, 5, 2.5, 2.5, 2.5, boxMat);
    addStructure(-25, 5, 4, 4, 4, boxMat);
    addStructure(25, 25, 3, 3, 3, boxMat);

    // --- Spēlētājs un Ierocis ---
    const player = {
        hp: 100, score: 0, ammo: 30, maxAmmo: 30, reserveAmmo: 90,
        speed: 13.0, isReloading: false
    };
    camera.position.set(0, 2, 40);

    // 3D Ierocis (Sarežģītāks modelis - Stobrs + Korpuss + Tēmeklis)
    const gunGroup = new THREE.Group();
    const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.3), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
    const barrelMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.25), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
    barrelMesh.rotation.x = Math.PI / 2;
    barrelMesh.position.z = -0.25;
    const scopeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.12), new THREE.MeshStandardMaterial({ color: 0x334155 }));
    scopeMesh.position.set(0, 0.05, -0.05);

    gunGroup.add(bodyMesh, barrelMesh, scopeMesh);
    scene.add(gunGroup);

    // Vizuālie efekti ieroča galam
    const flashLight = new THREE.PointLight(0xfde047, 0, 3);
    flashLight.position.set(0, 0, -0.4);
    gunGroup.add(flashLight);

    // Kustības un peles loģika
    const keys = { w: false, a: false, s: false, d: false };
    let velocity = new THREE.Vector3(), yaw = 0, pitch = 0;
    let mouseMoveX = 0, mouseMoveY = 0; // Priekš Weapon Sway

    document.addEventListener('keydown', (e) => { 
        if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
        if(e.key.toLowerCase() === 'r') reload();
    });
    document.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    
    document.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        mouseMoveX = e.movementX;
        mouseMoveY = e.movementY;
        yaw -= e.movementX * 0.0022;
        pitch -= e.movementY * 0.0022;
        pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    });

    // --- Boti, Daļiņas un Šaušana ---
    const bots = [];
    const particles = [];
    const raycaster = new THREE.Raycaster();

    function spawnBot(x, z) {
        const botGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.8, 1.6), new THREE.MeshStandardMaterial({ color: 0x9a3412 })); // T-Skins
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xd97706 }));
        head.position.y = 1.75;
        botGroup.add(body, head);
        botGroup.position.set(x, 1.4, z);
        botGroup.lastShot = 0;
        scene.add(botGroup);
        bots.push(botGroup);
    }

    // Izvietojam botus
    spawnBot(-35, -35); spawnBot(35, -35); spawnBot(-35, 15); spawnBot(35, 30);

    // Šaušanas izpilde
    document.addEventListener('mousedown', (e) => {
        if (!isLocked || e.button !== 0 || player.hp <= 0 || player.ammo <= 0 || player.isReloading) return;

        player.ammo--;
        updateHUD();

        // Recoil vizuālais grūdiens
        gunGroup.position.z += 0.07;
        gunGroup.position.y += 0.02;

        // Ieslēdz Muzzle Flash uz mirkli
        flashLight.intensity = 3;
        setTimeout(() => flashLight.intensity = 0, 40);

        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        
        // Trāpījumu aprēķins
        const intersectsBot = raycaster.intersectObjects(bots, true);
        const intersectsWall = raycaster.intersectObjects(walls);

        let botDist = intersectsBot.length > 0 ? intersectsBot[0].distance : Infinity;
        let wallDist = intersectsWall.length > 0 ? intersectsWall[0].distance : Infinity;

        if (intersectsBot.length > 0 && botDist < wallDist) {
            // Atrodam galveno bota objektu (grupu)
            let hitObj = intersectsBot[0].object;
            while (hitObj.parent && hitObj.parent !== scene) {
                hitObj = hitObj.parent;
            }
            
            // Radām asins daļiņas trāpījuma vietā
            createBloodEffect(intersectsBot[0].point);

            // Respawn
            hitObj.position.set((Math.random() - 0.5) * 70, 1.4, (Math.random() - 0.5) * 70);
            player.score++;
            updateHUD();
        }
    });

    function reload() {
        if (player.isReloading || player.ammo === player.maxAmmo || player.reserveAmmo <= 0) return;
        player.isReloading = true;
        document.getElementById('ammo').innerText = "RELOADING";
        setTimeout(() => {
            const needed = player.maxAmmo - player.ammo;
            const transfer = Math.min(needed, player.reserveAmmo);
            player.ammo += transfer;
            player.reserveAmmo -= transfer;
            player.isReloading = false;
            updateHUD();
        }, 1400);
    }

    function updateHUD() {
        document.getElementById('score').innerText = player.score;
        document.getElementById('hp').innerText = Math.max(0, Math.ceil(player.hp));
        if(!player.isReloading) document.getElementById('ammo').innerText = `${player.ammo}/${player.reserveAmmo}`;
    }

    function createBloodEffect(pos) {
        for (let i = 0; i < 15; i++) {
            const pMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshBasicMaterial({ color: 0xb91c1c }));
            pMesh.position.copy(pos);
            scene.add(pMesh);
            particles.push({
                mesh: pMesh,
                v: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*4+1, (Math.random()-0.5)*4),
                life: 1.0
            });
        }
    }

    // --- Galvenais spēles cikls ---
    const clock = new THREE.Clock();
    let bobTime = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const time = performance.now();

        if (player.hp <= 0) {
            document.exitPointerLock();
            document.getElementById('title').innerText = "DEFEAT / MATCH OVER";
            document.getElementById('title').style.color = "#ef4444";
            document.getElementById('instructions').innerHTML = `Tu tiki izslēgts. Kopā nošauti boti: <strong>${player.score}</strong>.<br><br>Pārlādē lapu (F5), lai sāktu jaunu maču.`;
            blocker.style.display = 'flex';
            return;
        }

        if (isLocked) {
            // 1. Kustība ar WASD
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            let moveZ = Number(keys.w) - Number(keys.s);
            let moveX = Number(keys.d) - Number(keys.a);

            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0; camDir.normalize();
            const camSide = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();

            if (keys.w || keys.s) velocity.addScaledVector(camDir, moveZ * player.speed * 10 * delta);
            if (keys.a || keys.d) velocity.addScaledVector(camSide, moveX * player.speed * 10 * delta);

            const oldPos = camera.position.clone();
            camera.position.addScaledVector(velocity, delta);

            // Sienu kolīzija (Wall Collision)
            walls.forEach(wall => {
                if (new THREE.Box3().setFromObject(wall).intersectsBox(new THREE.Box3(
                    new THREE.Vector3(camera.position.x-0.7, 0, camera.position.z-0.7),
                    new THREE.Vector3(camera.position.x+0.7, 4, camera.position.z+0.7)
                ))) { camera.position.copy(oldPos); }
            });
            camera.position.y = 2;

            // 2. IEROČA ANIMĀCIJAS (Bobbing & Sway)
            gunGroup.position.copy(camera.position);
            gunGroup.quaternion.copy(camera.quaternion);

            // Bāzes nobīde uz leju/labi
            let targetX = 0.16;
            let targetY = -0.22;
            let targetZ = -0.45;

            // Weapon Reload pozīcija (ierocis nolaižas zemāk)
            if (player.isReloading) { targetY = -0.45; targetX = 0.12; }

            // Weapon Bobbing (Šūpošanās skrienot)
            if (keys.w || keys.s || keys.a || keys.d) {
                bobTime += delta * 12;
                targetY += Math.sin(bobTime) * 0.015;
                targetX += Math.cos(bobTime / 2) * 0.01;
            }

            // Weapon Sway (Reakcija uz peli)
            targetX -= mouseMoveX * 0.0003;
            targetY += mouseMoveY * 0.0003;
            mouseMoveX *= 0.85; mouseMoveY *= 0.85; // slāpēšana

            gunGroup.translateX(targetX);
            gunGroup.translateY(targetY);
            gunGroup.translateZ(targetZ);
            
            // Lēna atgriešanās pēc šāviena atsitiena (Recoil recovery)
            gunGroup.position.y = THREE.MathUtils.lerp(gunGroup.position.y, gunGroup.position.y, 0.1);

            // 3. Botu AI un Uzbrukumi (Šaušana)
            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position).normalize();
                raycaster.set(bot.position, dir);
                const intersects = raycaster.intersectObjects(walls);
                const dToP = bot.position.distanceTo(camera.position);

                // Ja botam ir tieša redzamība (Line of Sight)
                if ((intersects.length === 0 || intersects[0].distance > dToP) && dToP < 45) {
                    if (time - bot.lastShot > 1600) { // Šauj ik pēc 1.6s
                        bot.lastShot = time;
                        player.hp -= 12; // Bojājums spēlētājam
                        updateHUD();
                        
                        // Vizuāla bota šāviena līnija uz mirkli
                        const lineGeo = new THREE.BufferGeometry().setFromPoints([bot.position.clone().add(new THREE.Vector3(0,1.5,0)), camera.position.clone().sub(new THREE.Vector3(0,0.3,0))]);
                        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xef4444 }));
                        scene.add(line);
                        setTimeout(() => scene.remove(line), 50);
                    }
                }

                // Boti lēnām patrulē spēlētāja virzienā
                const botOld = bot.position.clone();
                bot.position.addScaledVector(dir, 3.0 * delta);
                bot.position.y = 1.4; // notur augstumu
                walls.forEach(w => {
                    if(new THREE.Box3().setFromObject(w).intersectsBox(new THREE.Box3().setFromObject(bot))) bot.position.copy(botOld);
                });
            });

            // 4. Daļiņu (Asins) Fizika
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.v.y -= 9.8 * delta; // Gravitācija
                p.mesh.position.addScaledVector(p.v, delta);
                p.life -= delta * 1.2;
                if(p.mesh.position.y < 0.05) p.mesh.position.y = 0.05; // Neprogresē zem zemes

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
