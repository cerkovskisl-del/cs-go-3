<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 3D Web Offline Prototips</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: sans-serif;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            border-bottom: 3px solid #de9b35;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 0, 0.8);
        }
        #crosshair::before { top: 4px; left: -10px; width: 30px; height: 2px; }
        #crosshair::after { top: -10px; left: 4px; width: 2px; height: 30px; }
        
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <h1 style="color: #de9b35;">CS2 3D OFFLINE SIMULATORS</h1>
        <p>Noklikšķini uz ekrāna, lai sāktu spēli</p>
        <p style="color: #aaa; font-size: 14px;">Kustība: WASD | Tēmēšana: Pele | Šaušana: Kreisais klikšķis</p>
    </div>

    <div id="crosshair"></div>
    <div id="hud">PUNKTI: <span id="score">0</span></div>

<script>
    // --- Kontroles mehānika (PointerLock) ---
    const blocker = document.getElementById('blocker');
    let isLocked = false;

    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            blocker.style.display = 'none';
            isLocked = true;
        } else {
            blocker.style.display = 'flex';
            isLocked = false;
        }
    });

    // --- 3D Spēles Inicializācija ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a222d); // CS2 stila pelēkzilas debesis
    scene.fog = new THREE.FogExp2(0x1a222d, 0.015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Apgaismojums
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 40, 20);
    scene.add(dirLight);

    // Zeme (Spēles karte / "Dust 2" grīda)
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x554d43 }); // Smilšu krāsa
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Spēlētāja sākuma pozīcija
    camera.position.y = 2; // Acu augstums

    // --- Ieroča modelis (Vienkāršs 3D bloks ekrāna stūrī) ---
    const gunGeo = new THREE.BoxGeometry(0.1, 0.1, 0.5);
    const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const gun = new THREE.Mesh(gunGeo, gunMat);
    scene.add(gun);

    // --- Kustības mainīgie ---
    const keys = { w: false, a: false, s: false, d: false };
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    
    // Peles rotācijas sekošana
    let yaw = 0;
    let pitch = 0;

    document.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    document.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    
    document.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        
        // Pagriež kameru pēc peles kustības
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        
        // Ierobežo skatu uz augšu/leju (kā īstā FPS)
        pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    });

    // --- Botu (Mērķu) izveide ---
    const bots = [];
    let score = 0;

    function spawnBot() {
        const botGeo = new THREE.BoxGeometry(2, 3, 2); // Cilvēka izmēra kubs
        const botMat = new THREE.MeshStandardMaterial({ color: 0xef4444 }); // Teroristu sarkanais
        const bot = new THREE.Mesh(botGeo, botMat);
        
        // Novieto botu nejaušā vietā uz kartes
        bot.position.x = (Math.random() - 0.5) * 60;
        bot.position.z = (Math.random() - 0.5) * 60;
        bot.position.y = 1.5; // Uz zemes
        
        scene.add(bot);
        bots.push(bot);
    }

    // Izveidojam pirmos 5 botus
    for(let i=0; i<6; i++) spawnBot();

    // --- Šaušanas mehānika ---
    const raycaster = new THREE.Raycaster();
    
    document.addEventListener('mousedown', (e) => {
        if (!isLocked || e.button !== 0) return;

        // Ieroča "atpakaļatgriešanās" efekts (recoil animācija)
        gun.position.z += 0.1;

        // Šaujam taisni no kameras centra
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(bots);

        if (intersects.length > 0) {
            const hitBot = intersects[0].object;
            
            // Efekts: nomainām bota krāsu uz mirkli pirms izdzēšanas
            hitBot.material.color.setHex(0xffffff);
            
            setTimeout(() => {
                scene.remove(hitBot);
                const index = bots.indexOf(hitBot);
                if (index > -1) bots.splice(index, 1);
                
                score += 100;
                document.getElementById('score').innerText = score;
                
                // Izveidojam jaunu botu mirušā vietā
                spawnBot();
            }, 100);
        }
    });

    // Loga izmēra maiņa
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Galvenais 3D renderēšanas cikls ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        if (isLocked) {
            // 1. Kustības aprēķins
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(keys.w) - Number(keys.s);
            direction.x = Number(keys.d) - Number(keys.a);
            direction.normalize();

            // Pārvietošanās attiecībā pret kameras skata virzienu
            const camDirection = new THREE.Vector3();
            camera.getWorldDirection(camDirection);
            camDirection.y = 0; // Neļauj lidot uz augšu skatoties debesīs
            camDirection.normalize();

            const camSide = new THREE.Vector3();
            camSide.crossVectors(camera.up, camDirection).normalize();

            if (keys.w || keys.s) velocity.addScaledVector(camDirection, direction.z * 40.0 * delta);
            if (keys.a || keys.d) velocity.addScaledVector(camSide, direction.x * 40.0 * delta);

            camera.position.addScaledVector(velocity, delta);
            
            // Neļauj izkrist cauri zemei
            camera.position.y = 2; 

            // 2. Ieroča pozicionēšana (piesaistīts kamerai)
            gun.position.copy(camera.position);
            gun.quaternion.copy(camera.quaternion);
            // Nobīdām ieroci uz leju un pa labi, lai tas izskatītos kā FPS spēlē
            gun.translateZ(-0.6);
            gun.translateX(0.2);
            gun.translateY(-0.25);
            
            // Maiga ieroča atgriešanās pēc šāviena
            gun.position.z = THREE.MathUtils.lerp(gun.position.z, 0, 0.1);

            // 3. Botu loģika (Boti lēnām kustas uz spēlētāja pusi)
            bots.forEach(bot => {
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, bot.position);
                dirToPlayer.y = 0;
                dirToPlayer.normalize();
                bot.position.addScaledVector(dirToPlayer, 2.0 * delta); // Botu ātrums
            });
        }

        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>
