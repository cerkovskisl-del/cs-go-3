<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Lokālais Botu simulators</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            background-color: #de9b35;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 10px;
        }
        button:hover {
            background-color: #c98a2d;
        }
        .log-box {
            background-color: #111116;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            border-radius: 4px;
            text-align: left;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
        }
        .stat-box {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CS2 Lokālais Simulators</h1>
    <p>Režīms: Bezsaiste (Offline ar botiem)</p>

    <div class="stat-box">
        <div>Tavi punkti: <span id="player-score">0</span></div>
        <div>Botu punkti: <span id="bot-score">0</span></div>
    </div>

    <button onclick="saktRaundu()">Sākt nākamo raundu</button>
    <button onclick="notiritLogu()">Notīrīt vēsturi</button>

    <div class="log-box" id="log">
        [Sistēma] Spēle gatava. Noklikšķini "Sākt nākamo raundu"...<br>
    </div>
</div>

<script>
    let playerScore = 0;
    let botScore = 0;

    // Botu vārdu saraksts simulācijai
    const botuVardi = ["Kārlis [Bot]", "Jānis [Bot]", "Anna [Bot]", "Māris [Bot]", "Gatis [Bot]"];
    
    // Darbību saraksts
    const situacijas = [
        "ieņēma A punktu.",
        "veiksmīgi izmantoja dūmu granātu.",
        "pārsteidza pretinieku aiz stūra.",
        "uzvarēja tēmēšanas divcīņā."
    ];

    function saktRaundu() {
        const logElements = document.getElementById("log");
        
        // Lokāli aprēķina nejaušu rezultātu (simulē botu darbību)
        const nejrausaIzvele = Math.random();
        const nejreusBots = botuVardi[Math.floor(Math.random() * botuVardi.length)];
        const nejausaSituacija = situacijas[Math.floor(Math.random() * situacijas.length)];
        
        let ieraksts = "";

        if (nejrausaIzvele > 0.5) {
            playerScore++;
            document.getElementById("player-score").innerText = playerScore;
            ieraksts = `<span style="color: #4caf50;">[Uzvara]</span> Tu pārspēji ${nejreusBots}, kurš ${nejausaSituacija}`;
        } else {
            botScore++;
            document.getElementById("bot-score").innerText = botScore;
            ieraksts = `<span style="color: #f44336;">[Zaudējums]</span> ${nejreusBots} tevi pārspēja, jo viņš ${nejausaSituacija}`;
        }

        // Pievieno jauno rindu logā
        logElements.innerHTML += ieraksts + "<br>";
        // Automātiski pārtin logu uz leju
        logElements.scrollTop = logElements.scrollHeight;
    }

    function notiritLogu() {
        document.getElementById("log").innerHTML = "[Sistēma] Vēsture notīrīta.<br>";
        playerScore = 0;
        botScore = 0;
        document.getElementById("player-score").innerText = playerScore;
        document.getElementById("bot-score").innerText = botScore;
    }
</script>

</body>
</html>
