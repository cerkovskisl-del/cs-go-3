<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 2D Botu Simulators</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        canvas {
            background-color: #333;
            border: 4px solid #de9b35;
            display: block;
            margin: 20px auto;
            cursor: crosshair;
        }
        .info {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>CS2 2D Offline Gameplay</h1>
    <div class="info">
        Punkti: <span id="score">0</span> | Dzīvības: <span id="health">100</span>
        <br><small>Vadi tēlu ar WASD. Tēmē un šauj ar peli.</small>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Spēlētāja iestatījumi
    const player = {
        x: 100,
        y: 250,
        radius: 15,
        color: '#4caf50',
        speed: 4,
        health: 100,
        score: 0
    };

    // Kontroles (tastatūra)
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Peles pozīcija un šaušana
    const mouse = { x: 0, y: 0 };
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    const bullets = [];
    canvas.addEventListener('mousedown', () => {
        if (player.health > 0) {
            // Aprēķina leņķi šāvienam peles virzienā
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                dx: Math.cos(angle) * 8,
                dy: Math.sin(angle) * 8,
                radius: 4,
                color: '#ffeb3b'
            });
        }
    });

    // Botu saraksts
    const bots = [];
    function spawnBot() {
        if (player.health > 0 && bots.length < 5) {
            bots.push({
                x: canvas.width + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                radius: 15,
                color: '#f44336',
                speed: Math.random() * 1.5 + 1
            });
        }
    }
    // Izveido jaunu botu ik pēc 2 sekundēm
    setInterval(spawnBot, 2000);

    // Galvenais spēles cikls (Game Loop)
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (player.health <= 0) {
            ctx.fillStyle = "#fff";
            ctx.font = "30px Arial";
            ctx.fillText("SPĒLE BEIGTIEN", canvas.width / 2 - 100, canvas.height / 2);
            return;
        }

        // 1. Kustība (Spēlētājs)
        if (keys['w'] && player.y > player.radius) player.y -= player.speed;
        if (keys['s'] && player.y < canvas.height - player.radius) player.y += player.speed;
        if (keys['a'] && player.x > player.radius) player.x -= player.speed;
        if (keys['d'] && player.x < canvas.width - player.radius) player.x += player.speed;

        // Zīmē spēlētāju
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();

        // Tēmēklis (Līnija no spēlētāja uz peli)
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 2. Lodes apstrāde
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.dx;
            b.y += b.dy;

            // Uzzīmē lodi
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.closePath();

            // Izdzēš lodes, kas iziet ārpus ekrāna
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // 3. Botu apstrāde un loģika
        for (let i = bots.length - 1; i >= 0; i--) {
            const bot = bots[i];
            
            // Bots kustas uz spēlētāja pusi
            if (bot.x > player.x) bot.x -= bot.speed;
            else bot.x += bot.speed;
            
            if (bot.y > player.y) bot.y -= bot.speed;
            else bot.y += bot.speed;

            // Uzzīmē botu
            ctx.beginPath();
            ctx.arc(bot.x, bot.y, bot.radius, 0, Math.PI * 2);
            ctx.fillStyle = bot.color;
            ctx.fill();
            ctx.closePath();

            // Pārbauda sadursmi ar spēlētāju (Boti dara bojājumus)
            const distToPlayer = Math.hypot(bot.x - player.x, bot.y - player.y);
            if (distToPlayer < bot.radius + player.radius) {
                player.health -= 0.5; // Samazina dzīvības
                document.getElementById("health").innerText = Math.max(0, Math.floor(player.health));
            }

            // Pārbauda vai lode trāpa botam
            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                const distToBullet = Math.hypot(bot.x - b.x, bot.y - b.y);
                
                if (distToBullet < bot.radius + b.radius) {
                    // Trāpījums: izdzēš botu un lodi, palielina punktus
                    bots.splice(i, 1);
                    bullets.splice(j, 1);
                    player.score += 10;
                    document.getElementById("score").innerText = player.score;
                    break;
                }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    // Uzsāk pirmo botu un spēles ciklu
    spawnBot();
    gameLoop();
</script>

</body>
</html>
